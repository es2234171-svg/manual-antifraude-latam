<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Hoja de Cálculo de Cargos y Aduanas">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#2b1200"/>
      <stop offset="48%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 .36 0 0 .36 0 0 0 0 0 0 0 0 .85 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font-family:'Space Grotesk','Sora',Arial,sans-serif;font-weight:900}
      .body{font-family:'Sora',Arial,sans-serif;font-weight:700}
      .mini{font-family:'Sora',Arial,sans-serif;font-weight:600}
    </style>
  </defs>
  <rect width="1200" height="800" fill="url(#bg3)"/>
  <path d="M98 610C294 371 487 361 631 456c185 122 318 65 486-120" fill="none" stroke="#ff6a00" stroke-width="5" opacity=".55" filter="url(#glow3)"/>
  <rect x="84" y="74" width="1032" height="652" rx="34" fill="#080808" stroke="#ff6a00" stroke-width="3" filter="url(#glow3)"/>
  <rect x="118" y="108" width="964" height="584" rx="24" fill="#101010" stroke="rgba(255,255,255,.16)"/>
  <text x="600" y="178" text-anchor="middle" fill="#fff" class="title" font-size="52">HOJA DE CÁLCULO DE</text>
  <text x="600" y="238" text-anchor="middle" fill="#ff6a00" class="title" font-size="62">CARGOS Y ADUANAS</text>
  <text x="600" y="278" text-anchor="middle" fill="#dddddd" class="mini" font-size="24">Calcula el importe total antes de finalizar la compra</text>
  <g transform="translate(150 330)">
    <rect width="620" height="295" rx="18" fill="#151515" stroke="rgba(255,106,0,.55)"/>
    <text x="30" y="46" fill="#ff6a00" class="title" font-size="25">CALCULADORA DE COSTE REAL</text>
    <line x1="25" y1="66" x2="595" y2="66" stroke="rgba(255,255,255,.22)"/>
    <g class="body" font-size="19">
      <text x="36" y="104" fill="#fff">Producto</text><text x="510" y="104" fill="#fff" text-anchor="end">29,00 €</text>
      <text x="36" y="144" fill="#fff">Envío</text><text x="510" y="144" fill="#fff" text-anchor="end">8,90 €</text>
      <text x="36" y="184" fill="#fff">IVA / Impuestos</text><text x="510" y="184" fill="#fff" text-anchor="end">8,38 €</text>
      <text x="36" y="224" fill="#fff">Comisión / cargos</text><text x="510" y="224" fill="#fff" text-anchor="end">7,50 €</text>
      <text x="36" y="264" fill="#fff">Tasa aduanera</text><text x="510" y="264" fill="#fff" text-anchor="end">3,00 €</text>
    </g>
  </g>
  <g transform="translate(805 330)">
    <rect width="245" height="295" rx="18" fill="#151515" stroke="rgba(255,106,0,.55)"/>
    <text x="122" y="54" text-anchor="middle" fill="#fff" class="title" font-size="28">TOTAL FINAL</text>
    <text x="122" y="128" text-anchor="middle" fill="#ff6a00" class="title" font-size="58">56,78 €</text>
    <text x="122" y="181" text-anchor="middle" fill="#ddd" class="body" font-size="21">Importe real</text>
    <text x="122" y="212" text-anchor="middle" fill="#ddd" class="body" font-size="21">antes de pagar</text>
    <rect x="28" y="240" width="190" height="34" rx="17" fill="rgba(255,106,0,.14)" stroke="rgba(255,106,0,.45)"/>
    <text x="123" y="263" text-anchor="middle" fill="#fff" class="body" font-size="17">Sin sorpresas al pagar</text>
  </g>
  <text x="600" y="674" text-anchor="middle" fill="#fff" class="body" font-size="24">IVA, envío, comisión y aduana organizados en un cálculo sencillo</text>
</svg>


